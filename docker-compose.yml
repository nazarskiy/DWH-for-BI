version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: ats_postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: <insert custom password here>
      POSTGRES_DB: ats_recruiting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
